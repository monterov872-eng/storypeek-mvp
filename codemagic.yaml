# Codemagic CI/CD for StoryPeek (Expo app in /mobile).
# Backend (/backend) is not built here — mobile only.
#
# iOS: see commented workflow at the bottom. Requires Apple Developer
# credentials, ios_signing, and App Store Connect API key in Codemagic.

workflows:
  expo-mobile-android:
    name: StoryPeek Mobile — Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      vars:
        EXPO_NO_DOTENV: "1"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          set -e
          cd mobile
          npm install
      - name: Run lint (optional)
        script: |
          cd mobile
          npm run lint --if-present
      - name: Expo prebuild (Android native project)
        script: |
          set -e
          export CI=1
          cd mobile
          npx expo prebuild --platform android --clean
      - name: Configure Android SDK path
        script: |
          set -e
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/mobile/android/local.properties"
      - name: Build Android APK (debug — no signing required)
        script: |
          set -e
          cd mobile/android
          ./gradlew assembleDebug
      # Release build (enable after adding android_signing in Codemagic UI):
      # - name: Build Android release
      #   script: |
      #     set -e
      #     cd mobile/android
      #     ./gradlew bundleRelease
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
      - mobile/android/app/build/outputs/**/*.aab

